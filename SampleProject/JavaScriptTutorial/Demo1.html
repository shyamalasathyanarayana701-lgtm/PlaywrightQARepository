<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function show(){
 
            for(let i=10;i<=30;i++){
                if(i%2==0){
                    document.write("Even Number :"+i+"<br/>")
                }
            }
        }
    </script>
</head>
<body>
    <h3>Test Web Page</h3>
    <input type="button" value="Execute" onmouseover="show()">
</body>
</html>
